name: Deploy

# Multi-book deploy via SSM. The SAME repo deploys every book site; per-site
# targets live in the `DEPLOY_SITES` repo variable (JSON array, shape in
# deploy/sites.example.json) so no infra detail is committed. AWS auth is OIDC
# (no static keys) assuming the role in the AWS_DEPLOY_ROLE_ARN secret.
#
# - push to main      -> redeploy every site (host code change)
# - workflow_dispatch -> redeploy one site / a chosen content release tag
#
# Per-book content (artifact + media) is pulled on the instance from the book's
# own content-repo release by deploy/deploy.sh — this repo stays book-agnostic.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      site:
        description: "site name from DEPLOY_SITES (blank = all)"
        required: false
      release_tag:
        description: "content release tag to import (blank = latest)"
        required: false

permissions:
  id-token: write   # for AWS OIDC
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set.outputs.sites }}
    steps:
      - id: set
        run: echo "sites=${{ vars.DEPLOY_SITES || '[]' }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    if: ${{ needs.prepare.outputs.sites != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJSON(needs.prepare.outputs.sites) }}
    steps:
      - name: Skip non-selected site
        id: gate
        run: |
          if [ -n "${{ inputs.site }}" ] && [ "${{ inputs.site }}" != "${{ matrix.site.name }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ matrix.site.region }}

      - name: Deploy via SSM
        if: steps.gate.outputs.skip != 'true'
        env:
          INSTANCE: ${{ matrix.site.instance_id }}
          APP_DIR: ${{ matrix.site.app_dir }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          # pull this commit on the box, then run its deploy script
          script="cd $APP_DIR && sudo git fetch --quiet origin && sudo git reset --hard $GITHUB_SHA && sudo -E env GIT_REF=$GITHUB_SHA RELEASE_TAG='$RELEASE_TAG' bash deploy/deploy.sh"
          cmd_id=$(aws ssm send-command \
            --instance-ids "$INSTANCE" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ matrix.site.name }} @ ${GITHUB_SHA::7}" \
            --parameters commands="$script" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $cmd_id"
          aws ssm wait command-executed --command-id "$cmd_id" --instance-id "$INSTANCE" || true
          aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE" \
            --query StandardOutputContent --output text
          status=$(aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE" \
            --query Status --output text)
          err=$(aws ssm get-command-invocation --command-id "$cmd_id" --instance-id "$INSTANCE" \
            --query StandardErrorContent --output text)
          echo "status: $status"
          if [ "$status" != "Success" ]; then echo "$err"; exit 1; fi
